version: '3.8'

services:
  # 데이터베이스 (PostGIS 확장 포함)
  db:
    image: postgis/postgis:14-3.2
    container_name: kride_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kride_safety
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    restart: always

  # 2. PGAdmin (웹에서 DB를 눈으로 확인하는 도구 - 선택사항)
  pgadmin:
    image: dpage/pgadmin4
    container_name: kride_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

  # 머신러닝 추론 서버
  ml_server:
    build: ./ml-server
    container_name: kride_ml
    volumes:
      - .:/app
      - ./data:/app/data  # 데이터셋 폴더 연결
    ports:
      - "8000:8000"
    depends_on:
      - db