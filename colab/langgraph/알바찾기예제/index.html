<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 알바 추천 챗봇 - LangGraph 노드 시각화</title>
    <link rel="stylesheet" href="/static/style.css">
    </head>
<body>
    <div id="app-container">
        <div id="chat-section">
            <div id="chat-header">알바고(AlbaGo) - AI 알바 추천 챗봇</div>
            
            <div id="chat-window">
                <div class="message-group">
                    <div class="message bot">
                        안녕하세요! 저는 '알바고'입니다. 당신의 알바 조건을 알려주세요!
                    </div>
                </div>
            </div>

            <form id="chat-form">
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button type="submit" id="send-button">전송</button>
            </form>
        </div>

        <div id="sidebar-container">
            <div class="sidebar-box">
                <h3>사용자 프로필</h3>
                <div id="profile-content">
                    <div class="profile-item">
                        <span class="profile-label">지역</span>
                        <span class="profile-value empty">미입력</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">직종</span>
                        <span class="profile-value empty">미입력</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">시간</span>
                        <span class="profile-value empty">미입력</span>
                    </div>
                    <div class="profile-item">
                        <span class="profile-label">시급</span>
                        <span class="profile-value empty">미입력</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-box">
                <h3>검색 결과</h3>
                <div class="results-text empty">아직 검색된 결과가 없습니다.</div>
            </div>

            <div class="sidebar-box">
                <h3>처리 단계</h3>
                <div id="node-trace" style="font-size: 12px; color: #666; line-height: 1.8;">
                    <span style="color: #999;">노드 실행 대기 중...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const profileContent = document.getElementById('profile-content');
        const resultsBox = document.querySelector('.results-text');
        const nodeTrace = document.getElementById('node-trace');

        const API_URL = 'http://127.0.0.1:8000/chat';
        const sessionId = 'session_' + Math.random().toString(36).substring(2, 11);

        const nodeLabels = {
            'classify_intent': '의도 분류',
            'update_profile': '프로필 업데이트',
            'check_sufficiency': '✓ 정보 확인',
            'format_search_query': '검색 쿼리 생성',
            'call_search_tool': '알바 검색',
            'generate_response': '응답 생성'
        };

        const nodeTraceEl = [];

        chatForm.addEventListener('submit', handleSubmit);

        async function handleSubmit(e) {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // 노드 추적 리셋
            nodeTrace.innerHTML = '';
            nodeTraceEl.length = 0;

            const loadingEl = appendMessage('AI가 생각 중입니다...', 'loading');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let finalState = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'complete') {
                                finalState = data.final;
                                loadingEl.remove();
                                
                                // 최종 응답 표시
                                // finalState.messages가 배열인지 확인
                                if (finalState && Array.isArray(finalState.messages)) {
                                    const lastMessage = finalState.messages[finalState.messages.length - 1];
                                    if (lastMessage && (lastMessage.type === 'ai' || lastMessage.role === 'ai')) {
                                        appendMessage(lastMessage.content, 'bot');
                                    }
                                }
                                
                                // 최종 상태로 사이드바 업데이트
                                if (finalState) {
                                    // [핵심 수정] 
                                    // finalState.user_profile과 finalState.search_results를 전달합니다.
                                    // 이 값들은 agent.py의 generate_response_node에서 반환된 값입니다.
                                    updateSidebar(finalState.user_profile, finalState.search_results);
                                }
                            } else if (data.type === 'error') {
                                loadingEl.remove();
                                appendMessage(`오류: ${data.message}`, 'bot');
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                loadingEl.remove();
                appendMessage(`오류 발생: ${error.message}`, 'bot');
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function appendMessage(text, type) {
            const group = document.createElement('div');
            group.className = 'message-group';
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            
            group.appendChild(msg);
            chatWindow.appendChild(group);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            return group;
        }

        function updateProfileUI(profile) {
            // [수정] profile이 null이나 undefined일 경우를 대비
            if (!profile) {
                profile = {}; 
            }
            
            const profileMap = {
                location: '지역',
                job_type: '직종',
                hours: '시간',
                pay: '시급'
            };

            profileContent.innerHTML = Object.entries(profileMap).map(([key, label]) => {
                const value = profile[key];
                return `
                    <div class="profile-item">
                        <span class="profile-label">${label}</span>
                        <span class="profile-value ${value ? '' : 'empty'}">
                            ${value || '미입력'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function updateSidebar(profile, results) {
            updateProfileUI(profile);
            
            if (results && results.trim() !== '' && !results.includes('오류') && !results.includes('검색 결과 없음')) {
                resultsBox.textContent = results;
                resultsBox.classList.remove('empty');
            } else {
                // 이 else 블록이 stale(오래된) 데이터를 지워줍니다.
                resultsBox.textContent = '아직 검색된 결과가 없습니다.';
                resultsBox.classList.add('empty');
            }
            // ---------------------
        }
    </script>
</body>
</html>
