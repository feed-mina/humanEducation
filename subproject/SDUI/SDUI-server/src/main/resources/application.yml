spring:
  application:
    name: SDUI-server
  main:
    allow-bean-definition-overriding: true
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/testdb # jdbc:postgresql://localhost:5432/testdb # 5434/SDUI_TD
    username: postgres # postgres # mina
    password: 1234 # password # 1234
    hikari:
      maximum-pool-size: 12
      connection-timeout: 30000
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: DemoBackendHikariPool
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    sql-migration-suffixes: .sql
    validate-on-migrate: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: yerin4984@gmail.com
    password: xbfkdgfxevqytije
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    debug: true

